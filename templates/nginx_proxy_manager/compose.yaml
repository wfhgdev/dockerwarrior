services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - dw_proxy_network
    depends_on:
      - db

  db:
    image: 'mariadb:10.11'
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_MYSQL_NAME}
      MYSQL_USER: ${DB_MYSQL_USER}
      MYSQL_PASSWORD: ${DB_MYSQL_PASSWORD}
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - dw_proxy_network

networks:
  dw_proxy_network:
    external: true